# Template — DO NOT commit real credentials.
#
# IMPORTANT: In HCP the htpasswd secret lives in the HostedCluster namespace
# (e.g., clusters), NOT in openshift-config like standard OCP.
#
# Generate:
#   htpasswd -c -B -b users.htpasswd <username> <password>
#   htpasswd -B -b users.htpasswd <username2> <password2>   # add more users
#
# Create secret:
#   oc create secret generic htpasswd-secret \
#     --from-file=htpasswd=users.htpasswd \
#     -n clusters
apiVersion: v1
kind: Secret
metadata:
  name: htpasswd-secret
  namespace: clusters
type: Opaque
data:
  htpasswd: <BASE64_ENCODED_HTPASSWD_FILE>
