# Template — DO NOT commit real certificate data.
# Secret must live in the same namespace as the HostedCluster (e.g., clusters).
# Generate with cert-manager or:
#   openssl req -x509 -newkey rsa:4096 -keyout tls.key -out tls.crt \
#     -days 365 -nodes -subj "/CN=api.<CLUSTER_NAME>.<BASE_DOMAIN>" \
#     -addext "subjectAltName=DNS:api.<CLUSTER_NAME>.<BASE_DOMAIN>"
#
# Then encode:
#   oc create secret tls api-custom-cert \
#     --cert=tls.crt --key=tls.key \
#     -n clusters --dry-run=client -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: api-custom-cert
  namespace: clusters
type: kubernetes.io/tls
data:
  tls.crt: <BASE64_ENCODED_CERT>
  tls.key: <BASE64_ENCODED_KEY>
