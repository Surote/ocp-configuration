apiVersion: v1
kind: LimitRange
metadata:
  name: default-limitrange
  namespace: <NAMESPACE>
spec:
  limits:
  - type: Container
    default:
      cpu: 500m
      memory: 256Mi
    defaultRequest:
      cpu: 100m
      memory: 64Mi
    max:
      cpu: "4"
      memory: 4Gi
    min:
      cpu: 10m
      memory: 16Mi
  - type: Pod
    max:
      cpu: "8"
      memory: 8Gi
  - type: PersistentVolumeClaim
    max:
      storage: 50Gi
    min:
      storage: 1Gi
