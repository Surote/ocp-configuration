apiVersion: monitoring.openshift.io/v1
kind: AlertingRule
metadata:
  name: etcd-alerts
  namespace: openshift-monitoring
spec:
  groups:
  - name: etcd.rules
    rules:
    - alert: EtcdHighLeaderChanges
      annotations:
        description: etcd cluster has seen {{ $value }} leader changes within the last 15 minutes. Frequent changes indicate etcd instability.
        summary: etcd cluster is experiencing high leader changes
      expr: |
        increase(etcd_server_leader_changes_seen_total[15m]) > 4
      for: 5m
      labels:
        severity: warning
    - alert: EtcdHighRoundTripTime
      annotations:
        description: etcd peer round-trip time to {{ $labels.To }} is high ({{ $value }}s). This may affect cluster stability.
        summary: etcd round-trip time is too high
      expr: |
        histogram_quantile(0.99, rate(etcd_network_peer_round_trip_time_seconds_bucket[5m])) > 0.15
      for: 10m
      labels:
        severity: warning
