apiVersion: monitoring.openshift.io/v1
kind: AlertingRule
metadata:
  name: node-not-ready-alert
  namespace: openshift-monitoring
spec:
  groups:
  - name: node.rules
    rules:
    - alert: NodeNotReady
      annotations:
        description: Node {{ $labels.node }} has been in NotReady state for more than 5 minutes.
        summary: Node is not ready
      expr: |
        kube_node_status_condition{condition="Ready",status="true"} == 0
      for: 5m
      labels:
        severity: critical
    - alert: NodeMemoryPressure
      annotations:
        description: Node {{ $labels.node }} is experiencing memory pressure.
        summary: Node under memory pressure
      expr: |
        kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
      for: 2m
      labels:
        severity: warning
    - alert: NodeDiskPressure
      annotations:
        description: Node {{ $labels.node }} is experiencing disk pressure.
        summary: Node under disk pressure
      expr: |
        kube_node_status_condition{condition="DiskPressure",status="true"} == 1
      for: 2m
      labels:
        severity: warning
