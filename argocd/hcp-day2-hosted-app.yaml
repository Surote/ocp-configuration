# Template for deploying day2 config to the hosted cluster itself.
# Replace <HOSTED_CLUSTER_API_URL> with the hosted cluster's API server URL.
# Register the cluster in ArgoCD first:
#   argocd cluster add <KUBECONFIG_CONTEXT> --name <CLUSTER_NAME>
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hcp-day2-hosted
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/Surote/ocp-configuration.git
    targetRevision: main
    path: hcp-day2
    directory:
      exclude: nodepools/**
  destination:
    server: <HOSTED_CLUSTER_API_URL>
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
